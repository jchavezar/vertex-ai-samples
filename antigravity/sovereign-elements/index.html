<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sovereign Elements - Envato Replica</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="header">
        <div class="logo">Sovereign Elements</div>
        <nav class="nav">
            <a href="#">Gen AI</a>
            <a href="#">Video Templates</a>
            <a href="#">Stock Video</a>
        </nav>
        <div class="search-container">
            <div class="search-bar">
                <span class="search-icon">🔍</span>
                <input type="text" placeholder="Search assets...">
                <span class="action-icons">🎵 🖼️</span>
            </div>
            <div class="suggestions" id="suggestions">
                <!-- Suggestions will appear here -->
            </div>
        </div>
        <button class="cta-btn">Get unlimited downloads</button>
    </header>

    <main class="main-content">
        <section class="banner">
            <h1>Unlimited creativity, all in one place</h1>
            <p>Create with AI tools, and unlimited stock, fonts, videos, music, templates & more.</p>
        </section>

        <section class="grid-section">
            <h2>Stock Video</h2>
            <div class="grid">
                <div class="card">
                    <img src="./website_template_mockup.png" alt="Website Template">
                    <div class="card-info">
                        <h3>Website Template Mockup</h3>
                        <p>Ui Design • Web</p>
                    </div>
                </div>
                <div class="card">
                    <img src="./abstract_graphic.png" alt="Abstract Graphic">
                    <div class="card-info">
                        <h3>Modern Abstract Graphic</h3>
                        <p>Graphic • Asset</p>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
</body>
</html>
