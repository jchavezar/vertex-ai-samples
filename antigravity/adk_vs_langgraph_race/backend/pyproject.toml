[project]
name = "adk-vs-langgraph-race"
version = "0.1.0"
description = "Race comparison between Google ADK 2.0 and LangGraph"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.34.0",
    "google-adk>=1.25.0",
    "google-cloud-aiplatform>=1.90.0",
    "google-genai>=1.20.0",
    "langgraph>=0.3.0",
    "langchain>=0.3.0",
    "langchain-google-genai>=2.1.0",
    "langchain-google-vertexai>=2.0.0",
    "pydantic>=2.12.0",
    "python-dotenv>=1.0.0",
    "sse-starlette>=2.2.0",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
]
