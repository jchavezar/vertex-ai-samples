<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{{ document_title }}</title>
    <link rel="stylesheet" href="report_style.css">
</head>
<body>
    <header id="page-header">
        <div class="logo">pwc</div>
        <div class="doc-meta">CONFIDENTIAL - FOR INTERNAL USE ONLY</div>
    </header>

    <main>
        <!-- The content will be dynamically injected here by the pipeline -->
        <div class="content">
            {{ body_content | safe }}
        </div>
    </main>

    <footer id="page-footer">
        <div class="page-number">Page <span class="page"></span> | {{ document_title }}</div>
    </footer>
</body>
</html>
