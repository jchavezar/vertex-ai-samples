# Comparison-site nginx config.
#
# Locked down so the container is useful for ONE thing: serving three static
# files. Any path outside the allow-list returns 404. Security headers
# applied uniformly. No directory listings, no upstreams, no upload paths,
# no proxy_pass, nothing dynamic.

server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Hide nginx version from response headers.
    server_tokens off;

    # Disable any HTTP methods we don't need. Returns 405 before any location
    # block matches, so allow-list locations stay simple.
    if ($request_method !~ ^(GET|HEAD)$) {
        return 405;
    }

    # Block hidden files (.git, .env, .htaccess, ...).
    location ~ /\. {
        return 404;
    }

    # Explicit allow-list. Anything not matched falls through to the
    # catch-all 404 below.
    location = / {
        try_files /index.html =404;
    }

    location = /index.html {
        try_files $uri =404;
    }

    location = /data.json {
        try_files $uri =404;
        types { application/json json; }
    }

    location = /README.md {
        try_files $uri =404;
        types { text/plain md; }
    }

    # Tiny healthcheck endpoint for Cloud Run's startup probe.
    location = /healthz {
        access_log off;
        default_type text/plain;
        return 200 "ok\n";
    }

    # Catch-all: 404 for anything outside the allow-list.
    location / {
        return 404;
    }

    # gzip the JSON payload (5.6 MB → ~600 KB on the wire).
    gzip on;
    gzip_types application/json text/html text/plain;
    gzip_min_length 1024;

    # Defensive security headers — placed AFTER all location blocks so they
    # apply to every response (incl. 404 and 405). `always` so they're sent
    # for non-2xx codes too.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # CSP: vanilla JS is inline in index.html, so script-src needs 'unsafe-inline'.
    # No third-party fetches, no eval, no frames anywhere.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'none'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Cache-Control "public, max-age=300" always;
}
