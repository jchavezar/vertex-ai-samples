version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - VERTEX_COWORK_GCP_PROJECT_ID=${GCP_PROJECT_ID}
      - VERTEX_COWORK_GCP_LOCATION=${GCP_LOCATION:-us-central1}
      - VERTEX_COWORK_DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/vertex_cowork
      - VERTEX_COWORK_REDIS_URL=redis://redis:6379
    depends_on:
      - db
      - redis
    volumes:
      - ~/.config/gcloud:/root/.config/gcloud:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://backend:8080
    depends_on:
      - backend

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=vertex_cowork
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
