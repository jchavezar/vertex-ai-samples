[project]
name = "cloud-assist-error-remediation-backend"
version = "0.1.0"
description = "FastAPI backend and Google ADK agent for Cloud Assist Error Remediation Hub"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110.0",
    "uvicorn>=0.28.0",
    "pydantic>=2.6.0",
    "python-dotenv>=1.0.1",
    "google-adk>=0.1.0",
    "google-genai>=0.1.0",
    "google-cloud-logging>=3.8.0",
    "requests>=2.31.0",
    "pytest>=8.0.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]
