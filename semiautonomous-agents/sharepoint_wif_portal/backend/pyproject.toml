[project]
name = "sharepoint-wif-portal-backend"
version = "1.0.0"
description = "Backend for SharePoint WIF Portal - Direct StreamAssist API integration"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]>=0.135.3",
    "google-auth>=2.49.1",
    "pydantic>=2.12.5",
    "python-dotenv>=1.2.2",
    "requests>=2.33.1",
    "sse-starlette>=2.2.1",
    "uvicorn>=0.34.1",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
]
