[project]
name = "sharepoint-wif-portal-backend"
version = "1.0.0"
description = "Backend for SharePoint WIF Portal - Direct StreamAssist API integration"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi[standard]==0.135.3",
    "google-auth==2.49.1",
    "google-cloud-aiplatform==1.145.0",
    "pydantic==2.12.5",
    "python-dotenv==1.2.2",
    "requests==2.33.1",
    "sse-starlette==3.3.4",
    "uvicorn==0.43.0",
]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
]
