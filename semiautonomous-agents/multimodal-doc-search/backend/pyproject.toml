[project]
name = "pgvector-document-nexus"
version = "0.1.0"
description = "Document intelligence with Cloud SQL pgvector"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn>=0.32.0",
    "python-multipart>=0.0.12",
    "python-dotenv>=1.0.1",
    "google-adk>=0.5.0",
    "google-genai>=1.0.0",
    "google-cloud-aiplatform>=1.75.0",
    "asyncpg>=0.30.0",
    "pgvector>=0.3.6",
    "pypdf>=5.0.0",
    "PyMuPDF>=1.25.0",
    "Pillow>=11.0.0",
]

[tool.hatch.build.targets.wheel]
packages = ["."]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
