[project]
name = "observability-orchestra"
version = "1.0.0"
description = "Multi-model Agent Engine for observability testing with Claude and Gemini Flash-Lite"
requires-python = ">=3.11"
dependencies = [
    "google-adk>=1.9.0",
    "google-cloud-aiplatform[agent_engines]>=1.88.0",
    "anthropic[vertex]>=0.42.0",
    "google-auth>=2.29.0",
    "python-dotenv>=1.0.0",
    "cloudpickle>=3.0.0",
    "pydantic>=2.0.0",
    # OpenTelemetry instrumentation for tracing
    "opentelemetry-instrumentation-grpc>=0.48b0",
    "opentelemetry-instrumentation-httpx>=0.48b0",
    "opentelemetry-instrumentation-google-genai>=0.2b0",
]

[dependency-groups]
dev = ["pytest>=8.0.0", "pytest-asyncio>=0.23.0"]

[tool.uv]
managed = true
