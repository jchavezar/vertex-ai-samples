[project]
name = "sockagent-backend"
version = "0.1.0"
description = "SockAgent — terminal-aesthetic chat interface for Vertex AI"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.30.0",
    "google-genai>=1.0.0",
    "python-dotenv>=1.0.0",
    "websockets>=13.0",
]

[project.optional-dependencies]
dev = ["ruff"]
